<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🎱 팀 뽑기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    .container { width: 100%; max-width: 400px; }
    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .player-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .player-card {
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .player-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      border: none;
      background: transparent;
      width: 100%;
      outline: none;
    }
    .player-name::placeholder { color: #bbb; }
    .btn-shuffle {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1.25rem;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-shuffle:active { opacity: 0.8; transform: scale(0.98); }
    .result-box {
      border-radius: 12px;
      overflow: hidden;
      border: 0.5px solid #e0e0e0;
      display: none;
    }
    .team { padding: 1rem 1.25rem; }
    .team-a { background: #E6F1FB; border-bottom: 0.5px solid #e0e0e0; }
    .team-b { background: #EAF3DE; }
    .team-label {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      margin-bottom: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .team-players { font-size: 20px; font-weight: 500; color: #1a1a1a; }
    .vs-badge {
      text-align: center;
      padding: 8px;
      background: #f5f5f5;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      border-top: 0.5px solid #e0e0e0;
      border-bottom: 0.5px solid #e0e0e0;
    }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎱 팀 뽑기</h1>

    <div class="player-grid">
      <div class="player-card">
        <div class="avatar" style="background:#B5D4F4; color:#0C447C;">1</div>
        <input class="player-name" placeholder="선수 이름" value="김동현" maxlength="8" />
      </div>
      <div class="player-card">
        <div class="avatar" style="background:#C0DD97; color:#27500A;">2</div>
        <input class="player-name" placeholder="선수 이름" value="김영문" maxlength="8" />
      </div>
      <div class="player-card">
        <div class="avatar" style="background:#F5C4B3; color:#712B13;">3</div>
        <input class="player-name" placeholder="선수 이름" value="노상훈" maxlength="8" />
      </div>
      <div class="player-card">
        <div class="avatar" style="background:#CECBF6; color:#3C3489;">4</div>
        <input class="player-name" placeholder="선수 이름" value="조영준" maxlength="8" />
      </div>
    </div>

    <button class="btn-shuffle" onclick="shuffle()">
      <i class="ti ti-refresh"></i> 팀 뽑기
    </button>

    <div class="result-box" id="resultBox">
      <div class="team team-a">
        <div class="team-label">팀 A</div>
        <div class="team-players" id="teamA"></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="team team-b">
        <div class="team-label">팀 B</div>
        <div class="team-players" id="teamB"></div>
      </div>
    </div>
  </div>

  <script>
    function shuffle() {
      const inputs = document.querySelectorAll('.player-name');
      const names = Array.from(inputs).map(i => i.value.trim() || '?');
      for (let i = names.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [names[i], names[j]] = [names[j], names[i]];
      }
      document.getElementById('teamA').textContent = names[0] + ' · ' + names[1];
      document.getElementById('teamB').textContent = names[2] + ' · ' + names[3];
      const box = document.getElementById('resultBox');
      box.style.display = 'block';
      box.classList.remove('shake');
      void box.offsetWidth;
      box.classList.add('shake');
    }
  </script>
</body>
</html>
